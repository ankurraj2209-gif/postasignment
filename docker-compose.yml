version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-assignment
    environment:
      POSTGRES_DB: postservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gaurav
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assignment-network

  redis:
    image: redis:latest
    container_name: redis-assignment
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - assignment-network

  app:
    build: .
    container_name: springboot-assignment
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postservice
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=gaurav
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - assignment-network

# THIS SECTION MUST BE AT THE ZERO-INDENTATION LEVEL
networks:
  assignment-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
